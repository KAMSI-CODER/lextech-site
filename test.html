
<style>
.product-modal {
    display: none;
    position: fixed;
    z-index: 1000;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.5);
    animation: fadeIn 0.3s ease-out;
}

.product-modal.active {
    display: flex;
    align-items: center;
    justify-content: center;
}

.modal-content {
    background-color: white;
    padding: 30px;
    border-radius: 15px;
    width: 90%;
    max-width: 600px;
    max-height: 80vh;
    overflow-y: auto;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
}

.modal-close {
    float: right;
    font-size: 28px;
    font-weight: bold;
    color: #999;
    cursor: pointer;
    transition: color 0.3s;
}

.modal-close:hover {
    color: #333;
}

.info-btn {
    cursor: pointer;
    flex-shrink: 0;
}
</style>

<div id="productModal" class="product-modal">
    <div class="modal-content">
        <span class="modal-close" onclick="closeProductModal()">&times;</span>
        <h2 id="modalTitle" class="text-3xl font-bold mb-4 text-blue-600"></h2>
        <p id="modalDescription" class="text-gray-700 mb-6 text-lg leading-relaxed"></p>
        <div class="bg-blue-50 p-4 rounded-lg">
            <h3 class="font-semibold text-gray-800 mb-3">Key Features:</h3>
            <ul id="modalFeatures" class="list-disc list-inside text-gray-700 space-y-2"></ul>
        </div>
    </div>
</div>

<script>
function openProductModal(title, description) {
    const modal = document.getElementById('productModal');
    document.getElementById('modalTitle').textContent = title;
    document.getElementById('modalDescription').textContent = description;
    
    // Add features based on product
    const features = {
        'AirPods Pro': [
            'Active Noise Cancellation (ANC)',
            'Adaptive Transparency mode',
            'Personalized Spatial Audio',
            '6-hour battery life per charge',
            'MagSafe charging case',
            'Seamless Apple device integration',
            'Water and sweat resistant (IPX4)',
            'Automatic switching between devices'
        ]
    };
    
    const featuresList = document.getElementById('modalFeatures');
    featuresList.innerHTML = '';
    (features[title] || ['Premium quality product']).forEach(feature => {
        const li = document.createElement('li');
        li.textContent = feature;
        featuresList.appendChild(li);
    });
    
    modal.classList.add('active');
}

function closeProductModal() {
    document.getElementById('productModal').classList.remove('active');
}

window.onclick = function(event) {
    const modal = document.getElementById('productModal');
    if (event.target === modal) {
        modal.classList.remove('active');
    }
}
</script>
